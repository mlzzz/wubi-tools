name: Build Electron App for All Platforms

on:
  push:
    tags:
      - 'v*'  # 推送标签时触发（如 v1.0.0）
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

# 全局环境变量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决 Node.js 20 弃用警告
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
  ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

jobs:
  # ==================== macOS ARM (Apple Silicon) ====================
  build-macos-arm:
    name: Build macOS ARM (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Build for macOS ARM
        run: yarn run make
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false  # 跳过代码签名

      - name: List generated files
        run: |
          echo "Generated files in out/make:"
          ls -la out/make/ || echo "Directory not found"
          find out/make -type f 2>/dev/null || echo "No files found"

      - name: Upload artifacts (DMG & ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-build
          path: |
            out/make/*.dmg
            out/make/*.zip
            out/make/*.dmg.blockmap
          retention-days: 7
          if-no-files-found: warn

  # ==================== macOS Intel (x64) ====================
  build-macos-intel:
    name: Build macOS Intel (x64)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Build for macOS Intel (x64)
        run: yarn run make
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          npm_config_arch: x64
          ELECTRON_ARCH: x64

      - name: List generated files
        run: |
          echo "Generated files in out/make:"
          ls -la out/make/ || echo "Directory not found"
          find out/make -type f 2>/dev/null || echo "No files found"

      - name: Upload artifacts (DMG & ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-build
          path: |
            out/make/*.dmg
            out/make/*.zip
          retention-days: 7
          if-no-files-found: warn

  # ==================== Windows ====================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Yarn
        run: npm install -g yarn
        shell: pwsh

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000
        shell: pwsh
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Build for Windows
        run: yarn run make
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List generated files
        run: |
          Get-ChildItem -Recurse out/make/ | Select-Object FullName
        shell: pwsh

      - name: Upload artifacts (exe & installer)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/RELEASES
            out/make/**/*.msi
          retention-days: 7
          if-no-files-found: warn

  # ==================== Linux (Ubuntu) ====================
  build-linux:
    name: Build Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Build for Linux
        run: yarn run make
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List generated files
        run: |
          echo "Generated files in out/make:"
          ls -la out/make/ || echo "Directory not found"
          find out/make -type f 2>/dev/null || echo "No files found"

      - name: Upload artifacts (deb, rpm, AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            out/make/**/*.deb
            out/make/**/*.rpm
            out/make/**/*.AppImage
            out/make/**/*.snap
            out/make/**/*.pacman
          retention-days: 7
          if-no-files-found: warn

  # ==================== 创建 GitHub Release ====================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos-arm, build-macos-intel, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')  # 仅在推送标签时创建 Release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: |
          echo "All downloaded artifacts:"
          find artifacts -type f
          echo ""
          echo "File sizes:"
          find artifacts -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-arm-build/*
            artifacts/macos-intel-build/*
            artifacts/windows-build/*
            artifacts/linux-build/*
          generate_release_notes: true
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            ## 五笔码表助手 ${{ github.ref_name }}
            
            感谢使用五笔码表助手！
            
            ### 下载说明
            - macOS 用户请下载 `.dmg` 文件
            - Windows 用户请下载 `.exe` 安装程序
            - Linux 用户请下载 `.deb` 或 `.rpm` 文件
            
            ### 系统要求
            - macOS 10.15+
            - Windows 10/11
            - Ubuntu 18.04+ / 其他 Linux 发行版
        env:
          GITHUB_TOKEN: ${{ secrets.MLZZZ_PAT_TOKEN }}
