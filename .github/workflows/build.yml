name: Build Electron App and Upload to Releases

on:
  push:
    tags:
      - 'v*'  # 推送标签时触发（如 v1.0.0）
    branches:
      - master
  workflow_dispatch:  # 允许手动触发
    inputs:
      tag_name:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Is this a prerelease?'
        required: true
        default: false
        type: boolean

 # 关键：设置权限
permissions:
  contents: write

# 全局环境变量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决 Node.js 20 弃用警告
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
  ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

jobs:
  # ==================== macOS ARM (Apple Silicon) ====================
  build-macos-arm:
    name: Build macOS ARM (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Build for macOS ARM
        run: yarn run make
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false  # 跳过代码签名

      - name: List generated files
        run: |
          echo "Generated files in out/make:"
          ls -la out/make/ || echo "Directory not found"
          find out/make -type f 2>/dev/null || echo "No files found"

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/*.dmg
            out/make/*.zip
            out/make/*.dmg.blockmap
          fail_on_unmatched_files: false
        env:
          MLZZZ_PAT_TOKEN: ${{ secrets.MLZZZ_PAT_TOKEN }}

  # ==================== macOS Intel (x64) ====================
  build-macos-intel:
    name: Build macOS Intel (x64)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Build for macOS Intel (x64)
        run: yarn run make
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          npm_config_arch: x64
          ELECTRON_ARCH: x64

      - name: List generated files
        run: |
          echo "Generated files in out/make:"
          ls -la out/make/ || echo "Directory not found"
          find out/make -type f 2>/dev/null || echo "No files found"

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/*.dmg
            out/make/*.zip
          fail_on_unmatched_files: false
        env:
          MLZZZ_PAT_TOKEN: ${{ secrets.MLZZZ_PAT_TOKEN }}

  # ==================== Windows ====================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Yarn
        run: npm install -g yarn
        shell: pwsh

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000
        shell: pwsh

      - name: Build for Windows
        run: yarn run make
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List generated files
        run: |
          Get-ChildItem -Recurse out/make/ | Select-Object FullName
        shell: pwsh

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/RELEASES
            out/make/**/*.msi
          fail_on_unmatched_files: false
        env:
          MLZZZ_PAT_TOKEN: ${{ secrets.MLZZZ_PAT_TOKEN }}

  # ==================== Linux (Ubuntu) ====================
  build-linux:
    name: Build Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Build for Linux
        run: yarn run make
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List generated files
        run: |
          echo "Generated files in out/make:"
          ls -la out/make/ || echo "Directory not found"
          find out/make -type f 2>/dev/null || echo "No files found"

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/**/*.deb
            out/make/**/*.rpm
            out/make/**/*.AppImage
            out/make/**/*.snap
            out/make/**/*.pacman
          fail_on_unmatched_files: false
        env:
          MLZZZ_PAT_TOKEN: ${{ secrets.MLZZZ_PAT_TOKEN }}

  # ==================== 创建并统一上传所有产物 ====================
  # 这个 job 会等待所有构建完成后，统一上传到 Release
  create-release:
    name: Create Release and Upload All Artifacts
    runs-on: ubuntu-latest
    needs: [build-macos-arm, build-macos-intel, build-windows, build-linux]
    if: success() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: |
          echo "All downloaded artifacts:"
          find artifacts -type f
          echo ""
          echo "File sizes:"
          find artifacts -type f -exec ls -lh {} \;

      - name: Determine Release Tag
        id: get_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: Release ${{ steps.get_tag.outputs.tag }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/build-macos-arm/**
            artifacts/build-macos-intel/**
            artifacts/build-windows/**
            artifacts/build-linux/**
          fail_on_unmatched_files: false
          body: |
            ## 五笔码表助手 ${{ steps.get_tag.outputs.tag }}
            
            ### 📦 下载说明
            请根据您的操作系统选择对应的安装包：
            
            #### 🍎 macOS
            - **Apple Silicon (M1/M2/M3)**: 下载 `五笔码表助手-*.dmg` (ARM版本)
            - **Intel**: 下载 `五笔码表助手-*.dmg` (x64版本)
            
            #### 🪟 Windows
            - 下载 `五笔码表助手-*.exe` 安装程序
            - 或下载 `五笔码表助手-*.zip` 便携版
            
            #### 🐧 Linux
            - **Ubuntu/Debian**: 下载 `*.deb` 文件
            - **Fedora/RHEL**: 下载 `*.rpm` 文件
            - **其他发行版**: 下载 `*.AppImage` 文件
            
            ### ✅ 系统要求
            - macOS 10.15+
            - Windows 10/11
            - Ubuntu 18.04+ / 其他 Linux 发行版
            
            ### 🔧 更新内容
            自动生成的更新日志请查看下方。
        env:
          MLZZZ_PAT_TOKEN: ${{ secrets.MLZZZ_PAT_TOKEN }}

      - name: Display Release URL
        run: |
          echo "✅ Release created successfully!"
          echo "📦 Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_tag.outputs.tag }}"
        shell: bash
